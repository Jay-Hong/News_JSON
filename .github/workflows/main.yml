name:  News

on: # [push]
  workflow_dispatch:
  schedule:
    # 매일 06, 11, 16, 21 시 16분 전 (UTC+9) [UTC기준 매일 21, 02, 07, 12 시 16분 전]
    - cron: '44 01,06,11,20 * * *'
    # - cron: '55 23 31 2 6'	# 실행되지 않아야 하지만 ➡️ GitHub에서 2월중 토요일(6) 실행됨 / 마지막 * 면 계속 실행됨

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        # 개인 토큰을 사용할 것인지 말 것인지
        persist-credentials: false 
    - name: Upgrade pip
      run: python -m pip install --upgrade pip
    - name: apt-get update
      run: sudo apt-get update
    - name: Defendency
      run: |
        sudo apt-get install python3 python3-dev python3-pip libxml2-dev libxslt1-dev zlib1g-dev libffi-dev libssl-dev
    - name: requirements
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python3 -m pip install "pyOpenSSL==24.2.1" "cryptography==43.0.3"
    - name: Execution
      run: |
        git pull
        if [ -f nate_result.json ]; then rm -f nate_result.json; fi
        scrapy crawl nate_news_rank
        python3 - <<'PY'
        import json
        import sys

        with open("nate_result.json", encoding="utf-8") as result:
            items = json.load(result)

        if not isinstance(items, list) or len(items) < 1:
            print("Spider produced no items; failing before commit.")
            sys.exit(1)
        PY
        cp -fp nate_result.json ../newsURL.json
      working-directory: ./nate_news
    - name: Commit files
      run: |
        git config --local user.email "hjpyooo@gmail.com"
        git config --local user.name "Jay"
        if git diff --quiet -- nate_news/nate_result.json newsURL.json; then
          echo "Nothing to commit, working tree clean"
        else
          git add nate_news/nate_result.json newsURL.json
          git commit -m "News"
        fi
        git pull --rebase
    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
